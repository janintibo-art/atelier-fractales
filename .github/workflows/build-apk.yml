name: Construire l'APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

env:
  CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.0.2-all.zip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Forcer Gradle 8.0.2 comme Gradle systeme
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0.2-bin.zip -O /tmp/gradle.zip
          unzip -q -d "$HOME/gradle" /tmp/gradle.zip
          echo "$HOME/gradle/gradle-8.0.2/bin" >> "$GITHUB_PATH"

      - name: Composants Android + licences
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Installer Cordova
        run: npm install -g cordova@12

      - name: Verifier Gradle systeme
        run: gradle -v

      - name: Preparer le projet Cordova
        run: |
          cordova create build com.fractales.atelier "Atelier de Fractales"
          rm -rf build/www
          mkdir -p build/www
          cp index.html manifest.webmanifest sw.js build/www/
          cp icon-192.png icon-512.png icon-maskable-512.png apple-touch-icon.png icon-32.png build/www/
          cp icon-512.png build/icon-512.png
          cp config.xml build/config.xml

      - name: Ajouter la plateforme Android
        working-directory: build
        run: cordova platform add android@12.0.1

      - name: Construire l'APK (debug)
        working-directory: build
        run: cordova build android --verbose

      - name: Localiser l'APK
        id: apk
        run: |
          APK=$(find build -name "*.apk" | head -n 1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Televerser l'APK (artefact du run)
        uses: actions/upload-artifact@v4
        with:
          name: atelier-fractales-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Publier l'APK dans une Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: APK build ${{ github.run_number }}
          files: ${{ steps.apk.outputs.path }}
