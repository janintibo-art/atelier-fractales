name: Construire l'APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Composants Android + licences
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Installer Cordova
        run: npm install -g cordova@12

      - name: Diagnostic des versions
        run: |
          java -version
          node -v
          cordova -v
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Préparer le projet Cordova
        run: |
          cordova create build com.fractales.atelier "Atelier de Fractales"
          rm -rf build/www
          mkdir -p build/www
          cp index.html manifest.webmanifest sw.js build/www/
          cp icon-192.png icon-512.png icon-maskable-512.png apple-touch-icon.png icon-32.png build/www/
          cp icon-512.png build/icon-512.png
          cp config.xml build/config.xml

      - name: Ajouter la plateforme Android
        working-directory: build
        # Si l'échec persiste précisément ici, remplacez par : android@12.0.1
        run: cordova platform add android@13.0.0

      - name: Construire l'APK (debug)
        working-directory: build
        run: cordova build android --verbose

      - name: Localiser l'APK
        id: apk
        run: |
          APK=$(find build -name "*.apk" | head -n 1)
          echo "APK trouvé : $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Téléverser l'APK (artefact du run)
        uses: actions/upload-artifact@v4
        with:
          name: atelier-fractales-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Publier l'APK dans une Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: APK – build ${{ github.run_number }}
          body: "APK de l'Atelier de Fractales (clé de debug, installation manuelle)."
          files: ${{ steps.apk.outputs.path }}
